name: Release
on:
  push:
    tags:
      - "v*.*.*"
permissions: {}
defaults:
  run:
    shell: bash
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      RELEASE_REPOSITORY: ${{ github.repository }}
      RELEASE_SHA: ${{ github.sha }}
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and package extension
        run: pnpm package
      - name: Validate release version
        id: version
        run: |
          tag_version="${RELEASE_TAG#v}"
          package_version="$(jq -r '.version' package.json)"
          manifest_version="$(jq -r '.version' dist/manifest.json)"

          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag version ${tag_version} does not match package.json version ${package_version}" >&2
            exit 1
          fi

          if [ "$package_version" != "$manifest_version" ]; then
            echo "package.json version ${package_version} does not match manifest version ${manifest_version}" >&2
            exit 1
          fi

          echo "version=${manifest_version}" >> "$GITHUB_OUTPUT"
          echo "Version: ${manifest_version}"
      - name: Rename release package
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: mv package.zip "confluence-toc-renderer-v${RELEASE_VERSION}.zip"
      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          previous_tag="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"

          if [ -z "$previous_tag" ]; then
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${RELEASE_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${RELEASE_TAG}" \
              -f target_commitish="${RELEASE_SHA}" \
              --jq ".body" > release_notes.md
          else
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${RELEASE_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${RELEASE_TAG}" \
              -f target_commitish="${RELEASE_SHA}" \
              -f previous_tag_name="${previous_tag}" \
              --jq ".body" > release_notes.md
          fi
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --verify-tag \
            --title "${RELEASE_TAG}" \
            --notes-file release_notes.md \
            "confluence-toc-renderer-v${RELEASE_VERSION}.zip"
      - name: Upload release summary
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          {
            echo "### Release created"
            echo ""
            echo "**Version:** v${RELEASE_VERSION}"
            echo "**Tag:** ${RELEASE_TAG}"
            echo ""
            echo "**Assets:**"
            echo "- \`confluence-toc-renderer-v${RELEASE_VERSION}.zip\` - Chrome extension package"
          } >> "$GITHUB_STEP_SUMMARY"
